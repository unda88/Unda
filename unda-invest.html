<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Unda · Position Size</title>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --g: #00ffb2; --g2: rgba(0,255,178,0.55); --gold: #ffd97a;
      --text: #e0fff5; --text-muted: rgba(0,255,178,0.45);
      --border: rgba(0,255,178,0.18); --bf: rgba(0,255,178,0.55);
      --card: rgba(255,255,255,0.035); --inp: rgba(255,255,255,0.05);
    }
    html, body { min-height: 100vh; font-family: 'Outfit', sans-serif; background: #000b08; color: var(--text); display: flex; align-items: center; justify-content: center; overflow-x: hidden; }
    .bg { position: fixed; inset: 0; z-index: 0; background: radial-gradient(ellipse at 15% 15%, #001a0e 0%, #000c18 45%, #000508 100%); }
    .bg-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(0,255,178,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(0,255,178,0.025) 1px, transparent 1px); background-size: 40px 40px; mask-image: radial-gradient(ellipse at center, black 30%, transparent 80%); }
    .orb { position: absolute; border-radius: 50%; pointer-events: none; }
    .orb-1 { width: 600px; height: 600px; top: -150px; left: -150px; background: radial-gradient(circle, rgba(0,255,178,0.09) 0%, transparent 65%); animation: drift1 12s ease-in-out infinite alternate; }
    .orb-2 { width: 500px; height: 500px; bottom: -100px; right: -100px; background: radial-gradient(circle, rgba(255,217,122,0.07) 0%, transparent 65%); animation: drift2 15s ease-in-out infinite alternate; }
    @keyframes drift1 { from{transform:translate(0,0)} to{transform:translate(40px,30px)} }
    @keyframes drift2 { from{transform:translate(0,0)} to{transform:translate(-30px,-40px)} }
    .tl-top { position: fixed; top: 0; left: 0; right: 0; height: 2px; z-index: 10; background: linear-gradient(90deg, transparent 5%, var(--g) 30%, #fff 50%, var(--g) 70%, transparent 95%); box-shadow: 0 0 6px 2px var(--g), 0 0 30px 10px rgba(0,255,178,0.3), 0 0 80px 25px rgba(0,255,178,0.1); animation: flicker 9s ease-in-out infinite; }
    @keyframes flicker { 0%,100%{opacity:1} 92%{opacity:1} 93%{opacity:.7} 94%{opacity:1} 96%{opacity:.85} 97%{opacity:1} }

    /* ── Language Switcher ── */
    .lang-sw { position: fixed; top: 14px; right: 18px; z-index: 100; font-size: 11px; font-weight: 500; letter-spacing: .06em; color: var(--g2); cursor: pointer; user-select: none; background: rgba(0,255,178,0.06); border: 1px solid rgba(0,255,178,0.15); border-radius: 8px; padding: 5px 10px; transition: background .2s; }
    .lang-sw:hover { background: rgba(0,255,178,0.12); }
    .lang-menu { display: none; position: absolute; top: calc(100% + 6px); right: 0; background: #000d07; border: 1px solid rgba(0,255,178,0.18); border-radius: 12px; padding: 6px; min-width: 110px; box-shadow: 0 16px 40px rgba(0,0,0,0.7); flex-direction: column; gap: 2px; }
    .lang-sw.open .lang-menu { display: flex; }
    .lang-menu div { padding: 7px 12px; border-radius: 8px; cursor: pointer; color: var(--text-muted); transition: all .15s; font-size: 11px; }
    .lang-menu div:hover { background: rgba(0,255,178,0.1); color: var(--g); }
    .lang-menu div.active { color: var(--g); background: rgba(0,255,178,0.07); }

    .page { position: relative; z-index: 1; padding: 3rem 1rem; width: 100%; display: flex; justify-content: center; }
    .card { width: 100%; max-width: 480px; background: var(--card); backdrop-filter: blur(32px); -webkit-backdrop-filter: blur(32px); border-radius: 28px; border: 1px solid var(--border); overflow: hidden; position: relative; box-shadow: inset 0 1.5px 0 rgba(255,255,255,0.13), inset 0 -1px 0 rgba(0,255,178,0.06), 0 30px 90px rgba(0,0,0,0.75), 0 0 60px rgba(0,255,178,0.06); animation: cardIn 0.7s cubic-bezier(0.16,1,0.3,1) both; }
    @keyframes cardIn { from{opacity:0;transform:translateY(24px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
    .card::before { content:''; position:absolute; top:0; left:8%; right:8%; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.5) 35%,rgba(0,255,178,0.85) 50%,rgba(255,255,255,0.5) 65%,transparent); box-shadow:0 0 8px 1px rgba(0,255,178,0.35); }
    .card-inner { padding: 2.25rem 2.25rem 2rem; }

    .brand { text-align: center; margin-bottom: 1.5rem; }
    .brand-wave { font-size: 10px; letter-spacing: 0.28em; text-transform: uppercase; color: var(--g2); margin-bottom: 6px; }
    .brand-title { font-size: 27px; font-weight: 500; background: linear-gradient(130deg, #9effd9 0%, #fff 45%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 10px rgba(0,255,178,0.22)); }

    .hdiv { height: 1px; margin: 0 0 1.5rem; background: linear-gradient(90deg, transparent, rgba(0,255,178,0.22) 30%, rgba(255,255,255,0.1) 50%, rgba(0,255,178,0.22) 70%, transparent); box-shadow: 0 0 6px rgba(0,255,178,0.12); }



    .fg { margin-bottom: 1rem; }
    .flr { display: flex; align-items: center; gap: 7px; margin-bottom: 6px; }
    .fl { font-size: 10px; color: var(--text-muted); letter-spacing: 0.12em; text-transform: uppercase; font-weight: 500; }
    .iw { display: flex; align-items: center; background: var(--inp); border-radius: 11px; border: 1px solid rgba(0,255,178,0.12); padding: 0 15px; height: 48px; position: relative; overflow: hidden; transition: border-color .2s, box-shadow .2s, background .2s; box-shadow: inset 0 1px 0 rgba(255,255,255,0.07), inset 0 -1px 0 rgba(0,0,0,0.25); }
    .iw::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.16),transparent); }
    .iw:focus-within { border-color: var(--bf); background: rgba(0,255,178,0.04); box-shadow: 0 0 0 3px rgba(0,255,178,0.08), inset 0 1px 0 rgba(255,255,255,0.1), 0 0 14px rgba(0,255,178,0.1); }
    .r2 { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; }
    .r2 .iw { margin-bottom: 0; }
    .px { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--g2); margin-right: 11px; min-width: 12px; }
    .iw input { background: transparent; border: none; outline: none; color: var(--text); font-family: 'DM Mono', monospace; font-size: 16px; width: 100%; }
    .iw input::-webkit-inner-spin-button { opacity: 0.3; }

    /* Sl mode toggle */
    .sl-mode { display: flex; gap: 6px; margin-bottom: 6px; }
    .sl-btn { font-size: 9px; letter-spacing: .08em; text-transform: uppercase; padding: 3px 9px; border-radius: 6px; border: 1px solid rgba(0,255,178,0.15); background: transparent; color: var(--text-muted); cursor: pointer; font-family: 'Outfit', sans-serif; transition: all .15s; }
    .sl-btn.active { background: rgba(0,255,178,0.1); border-color: rgba(0,255,178,0.4); color: var(--g); }

    /* Results */
    .results { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; margin-top: 1.5rem; }
    .ri { background: rgba(0,255,178,0.04); border: 1px solid rgba(0,255,178,0.1); border-radius: 14px; padding: 15px 10px; text-align: center; position: relative; overflow: hidden; box-shadow: inset 0 1px 0 rgba(255,255,255,0.06), 0 4px 14px rgba(0,0,0,0.3); }
    .ri::before { content:''; position:absolute; top:0; left:12%; right:12%; height:1px; background:linear-gradient(90deg,transparent,rgba(255,255,255,0.2),transparent); }
    .ri.hl { background: rgba(0,255,178,0.09); border-color: rgba(0,255,178,0.3); box-shadow: inset 0 1px 0 rgba(255,255,255,0.13), 0 0 22px rgba(0,255,178,0.1); }
    .ri.full { grid-column: 1 / -1; }
    .rl { font-size: 9px; color: var(--text-muted); margin-bottom: 8px; letter-spacing: .09em; text-transform: uppercase; line-height: 1.3; }
    .rv { font-family: 'DM Mono', monospace; font-size: 14px; font-weight: 500; color: #b8ffe0; }
    .rv.big { font-size: 32px; font-weight: 400; background: linear-gradient(135deg, #00ffb2 0%, #fff 50%, var(--gold) 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; filter: drop-shadow(0 0 10px rgba(0,255,178,0.4)); }

    /* Info box */
    .info-box { margin-top: 12px; background: rgba(0,255,178,0.05); border: 1px solid rgba(0,255,178,0.15); border-radius: 12px; padding: 12px 14px; font-size: 12px; color: rgba(180,240,220,0.6); line-height: 1.6; display: none; }

    .footer { text-align: center; margin-top: 1.5rem; font-size: 10px; color: rgba(0,255,178,0.18); letter-spacing: .12em; text-transform: uppercase; }
    [dir="rtl"] .px { margin-right: 0; margin-left: 11px; }
  </style>
</head>
<body>
<div class="bg"><div class="bg-grid"></div><div class="orb orb-1"></div><div class="orb orb-2"></div></div>
<div class="tl-top"></div>

<!-- Language switcher -->
<div class="lang-sw" id="lang-sw" onclick="toggleLangMenu()">
  <span id="cur-lang">🇬🇧 EN</span> ▾
  <div class="lang-menu" id="lang-menu">
    <div onclick="setLang('nl','🇳🇱 NL')">🇳🇱 NL</div>
    <div onclick="setLang('en','🇬🇧 EN')" class="active">🇬🇧 EN</div>
    <div onclick="setLang('fr','🇫🇷 FR')">🇫🇷 FR</div>
    <div onclick="setLang('es','🇪🇸 ES')">🇪🇸 ES</div>
    <div onclick="setLang('de','🇩🇪 DE')">🇩🇪 DE</div>
    <div onclick="setLang('it','🇮🇹 IT')">🇮🇹 IT</div>
    <div onclick="setLang('pt','🇵🇹 PT')">🇵🇹 PT</div>
    <div onclick="setLang('tr','🇹🇷 TR')">🇹🇷 TR</div>
    <div onclick="setLang('ar','🇸🇦 AR')">🇸🇦 AR</div>
    <div onclick="setLang('ru','🇷🇺 RU')">🇷🇺 RU</div>
  </div>
</div>

<div class="page">
  <div class="card">
    <div class="card-inner">
      <div class="brand">
        <div class="brand-wave">Unda</div>
        <div class="brand-title" id="t-title">Position Size</div>
      </div>
      <div class="hdiv"></div>


      <div class="fg">
        <div class="flr"><span class="fl" id="t-portfolio-lbl">Portfolio size</span></div>
        <div class="iw"><span class="px" id="px-portfolio">€</span><input type="number" id="portfolio" value="10000" min="1" oninput="calc()"></div>
      </div>

      <!-- Risk -->
      <div class="fg">
        <div class="flr"><span class="fl" id="t-risk-lbl">Risk per trade</span></div>
        <div class="r2">
          <div class="iw"><span class="px">%</span><input type="number" id="riskPct" value="1" min="0.1" max="100" step="0.1" oninput="syncRPtoU();calc()"></div>
          <div class="iw"><span class="px" id="px-risk">€</span><input type="number" id="riskUsd" oninput="syncRUtoP();calc()"></div>
        </div>
      </div>

      <!-- Entry price -->
      <div class="fg">
        <div class="flr"><span class="fl" id="t-entry-lbl">Entry price</span></div>
        <div class="iw"><span class="px" id="px-entry">€</span><input type="number" id="entry" placeholder="100" min="0.000001" step="any" oninput="calc()"></div>
      </div>

      <!-- Stop loss -->
      <div class="fg">
        <div class="flr">
          <span class="fl" id="t-sl-lbl">Stop loss</span>
          <div class="sl-mode">
            <button class="sl-btn active" id="sl-price-btn" onclick="setSlMode('price')" id="t-sl-price-btn">Price</button>
            <button class="sl-btn" id="sl-pct-btn" onclick="setSlMode('pct')" id="t-sl-pct-btn">%</button>
          </div>
        </div>
        <div class="iw" id="sl-price-wrap"><span class="px" id="px-sl">€</span><input type="number" id="slPrice" placeholder="95" min="0" step="any" oninput="calc()"></div>
        <div class="iw" id="sl-pct-wrap" style="display:none"><span class="px">%</span><input type="number" id="slPct" placeholder="5" min="0.01" max="100" step="0.01" oninput="calc()"></div>
      </div>

      <!-- Results -->
      <div class="results">
        <div class="ri hl full">
          <div class="rl" id="t-shares-lbl">Shares / Units to buy</div>
          <div class="rv big" id="res-shares">—</div>
        </div>
        <div class="ri">
          <div class="rl" id="t-risk-amount-lbl">Risk amount</div>
          <div class="rv" id="res-risk">—</div>
        </div>
        <div class="ri">
          <div class="rl" id="t-position-lbl">Total position</div>
          <div class="rv" id="res-position">—</div>
        </div>
        <div class="ri">
          <div class="rl" id="t-sl-dist-lbl">Stop distance</div>
          <div class="rv" id="res-sl-dist">—</div>
        </div>
        <div class="ri">
          <div class="rl" id="t-portfolio-pct-lbl">Portfolio used</div>
          <div class="rv" id="res-portfolio-pct">—</div>
        </div>
      </div>

      <div class="info-box" id="info-box"></div>
      <div class="footer" id="t-footer">unda · wave your risk</div>
    </div>
  </div>
</div>

<script>
  const LANGS = {
    en: { dir:'ltr', sym:'$', title:'Position Size', portfolioLbl:'Portfolio size', riskLbl:'Risk per trade', entryLbl:'Entry price', slLbl:'Stop loss', slPriceBtn:'Price', slPctBtn:'%', sharesLbl:'Units to buy', riskAmountLbl:'Risk amount', positionLbl:'Total position', slDistLbl:'Stop distance', portfolioPctLbl:'Portfolio used', footer:'unda · wave your risk',
      infoOk: (sh, sym, risk, pos, pct) => `Buy ${sh} units. You risk ${sym}${risk} (${pct}% of portfolio). Total position: ${sym}${pos}.`,
      infoWarn: 'Position is more than 20% of your portfolio. Consider reducing your risk %.',
      infoBig: 'Position exceeds your portfolio. Reduce position size or check your entry/stop loss.',
    },
    nl: { dir:'ltr', sym:'€', title:'Positiegrootte', portfolioLbl:'Portfoliogrootte', riskLbl:'Risico per trade', entryLbl:'Instapprijs', slLbl:'Stop-loss', slPriceBtn:'Prijs', slPctBtn:'%', sharesLbl:'Eenheden te kopen', riskAmountLbl:'Risicobedrag', positionLbl:'Totale positie', slDistLbl:'Stop afstand', portfolioPctLbl:'Portfolio gebruikt', footer:'unda · beheers je risico',
      infoOk: (sh, sym, risk, pos, pct) => `Koop ${sh} eenheden. Je riskeer ${sym}${risk} (${pct}% van portfolio). Totale positie: ${sym}${pos}.`,
      infoWarn: 'Positie is meer dan 20% van je portfolio. Overweeg je risico % te verlagen.',
      infoBig: 'Positie overschrijdt je portfolio. Verklein de positiegrootte of controleer je instap/stop-loss.',
    },
    fr: { dir:'ltr', sym:'€', title:'Taille de Position', portfolioLbl:'Taille du portefeuille', riskLbl:'Risque par trade', entryLbl:'Prix d\'entrée', slLbl:'Stop-loss', slPriceBtn:'Prix', slPctBtn:'%', sharesLbl:'Unités à acheter', riskAmountLbl:'Montant risqué', positionLbl:'Position totale', slDistLbl:'Distance du stop', portfolioPctLbl:'Portefeuille utilisé', footer:'unda · maîtrisez votre risque',
      infoOk: (sh, sym, risk, pos, pct) => `Achetez ${sh} unités. Vous risquez ${sym}${risk} (${pct}% du portefeuille). Position totale : ${sym}${pos}.`,
      infoWarn: 'La position dépasse 20% de votre portefeuille. Envisagez de réduire votre risque %.',
      infoBig: 'La position dépasse votre portefeuille. Réduisez la taille ou vérifiez votre entrée/stop.',
    },
    es: { dir:'ltr', sym:'€', title:'Tamaño de Posición', stock:'Acción', crypto:'Crypto', portfolioLbl:'Tamaño del portafolio', riskLbl:'Riesgo por trade', entryLbl:'Precio de entrada', slLbl:'Stop-loss', slPriceBtn:'Precio', slPctBtn:'%', sharesLbl:'Acciones / Unidades a comprar', riskAmountLbl:'Monto en riesgo', positionLbl:'Posición total', slDistLbl:'Distancia del stop', portfolioPctLbl:'Portafolio usado', footer:'unda · domina tu riesgo',
      infoOk: (sh, sym, risk, pos, pct) => `Compra ${sh} unidades. Arriesgas ${sym}${risk} (${pct}% del portafolio). Posición total: ${sym}${pos}.`,
      infoWarn: 'La posición supera el 20% de tu portafolio. Considera reducir tu riesgo %.',
      infoBig: 'La posición supera tu portafolio. Reduce el tamaño o revisa tu entrada/stop.',
    },
    de: { dir:'ltr', sym:'€', title:'Positionsgröße', portfolioLbl:'Portfoliogröße', riskLbl:'Risiko pro Trade', entryLbl:'Einstiegspreis', slLbl:'Stop-Loss', slPriceBtn:'Preis', slPctBtn:'%', sharesLbl:'Einheiten zu kaufen', riskAmountLbl:'Risikobetrag', positionLbl:'Gesamtposition', slDistLbl:'Stop-Abstand', portfolioPctLbl:'Portfolio genutzt', footer:'unda · steuere dein Risiko',
      infoOk: (sh, sym, risk, pos, pct) => `Kaufe ${sh} Einheiten. Du riskierst ${sym}${risk} (${pct}% des Portfolios). Gesamtposition: ${sym}${pos}.`,
      infoWarn: 'Position übersteigt 20% deines Portfolios. Erwäge dein Risiko % zu reduzieren.',
      infoBig: 'Position übersteigt dein Portfolio. Reduziere die Größe oder prüfe Einstieg/Stop.',
    },
    it: { dir:'ltr', sym:'€', title:'Dimensione Posizione', portfolioLbl:'Dimensione portafoglio', riskLbl:'Rischio per trade', entryLbl:'Prezzo di ingresso', slLbl:'Stop-loss', slPriceBtn:'Prezzo', slPctBtn:'%', sharesLbl:'Unità da acquistare', riskAmountLbl:'Importo a rischio', positionLbl:'Posizione totale', slDistLbl:'Distanza stop', portfolioPctLbl:'Portafoglio usato', footer:'unda · gestisci il tuo rischio',
      infoOk: (sh, sym, risk, pos, pct) => `Acquista ${sh} unità. Rischi ${sym}${risk} (${pct}% del portafoglio). Posizione totale: ${sym}${pos}.`,
      infoWarn: 'La posizione supera il 20% del portafoglio. Considera di ridurre il rischio %.',
      infoBig: 'La posizione supera il portafoglio. Riduci la dimensione o controlla ingresso/stop.',
    },
    pt: { dir:'ltr', sym:'€', title:'Tamanho da Posição', portfolioLbl:'Tamanho do portfólio', riskLbl:'Risco por trade', entryLbl:'Preço de entrada', slLbl:'Stop-loss', slPriceBtn:'Preço', slPctBtn:'%', sharesLbl:'Unidades a comprar', riskAmountLbl:'Valor em risco', positionLbl:'Posição total', slDistLbl:'Distância do stop', portfolioPctLbl:'Portfólio usado', footer:'unda · controle seu risco',
      infoOk: (sh, sym, risk, pos, pct) => `Compre ${sh} unidades. Você arrisca ${sym}${risk} (${pct}% do portfólio). Posição total: ${sym}${pos}.`,
      infoWarn: 'A posição supera 20% do seu portfólio. Considere reduzir o risco %.',
      infoBig: 'A posição supera o seu portfólio. Reduza o tamanho ou verifique entrada/stop.',
    },
    tr: { dir:'ltr', sym:'$', title:'Pozisyon Büyüklüğü', portfolioLbl:'Portföy büyüklüğü', riskLbl:'İşlem başına risk', entryLbl:'Giriş fiyatı', slLbl:'Stop-loss', slPriceBtn:'Fiyat', slPctBtn:'%', sharesLbl:'Alınacak birim', riskAmountLbl:'Risk tutarı', positionLbl:'Toplam pozisyon', slDistLbl:'Stop mesafesi', portfolioPctLbl:'Portföy kullanımı', footer:'unda · riskinizi yönetin',
      infoOk: (sh, sym, risk, pos, pct) => `${sh} birim alın. ${sym}${risk} risk alıyorsunuz (portföyün %${pct}). Toplam pozisyon: ${sym}${pos}.`,
      infoWarn: 'Pozisyon portföyünüzün %20\'sini aşıyor. Risk %\'nizi azaltmayı düşünün.',
      infoBig: 'Pozisyon portföyünüzü aşıyor. Boyutu küçültün veya giriş/stop\'u kontrol edin.',
    },
    ar: { dir:'rtl', sym:'$', title:'حجم الصفقة', portfolioLbl:'حجم المحفظة', riskLbl:'المخاطرة لكل صفقة', entryLbl:'سعر الدخول', slLbl:'وقف الخسارة', slPriceBtn:'سعر', slPctBtn:'%', sharesLbl:'الوحدات للشراء', riskAmountLbl:'مبلغ المخاطرة', positionLbl:'إجمالي الصفقة', slDistLbl:'مسافة الوقف', portfolioPctLbl:'المحفظة المستخدمة', footer:'unda · تحكم في مخاطرك',
      infoOk: (sh, sym, risk, pos, pct) => `اشتر ${sh} وحدة. تخاطر بـ ${sym}${risk} (${pct}% من المحفظة). إجمالي الصفقة: ${sym}${pos}.`,
      infoWarn: 'الصفقة تتجاوز 20% من محفظتك. فكر في تقليل نسبة المخاطرة.',
      infoBig: 'الصفقة تتجاوز محفظتك. قلل الحجم أو راجع سعر الدخول/الوقف.',
    },
    ru: { dir:'ltr', sym:'$', title:'Размер позиции', portfolioLbl:'Размер портфеля', riskLbl:'Риск на сделку', entryLbl:'Цена входа', slLbl:'Стоп-лосс', slPriceBtn:'Цена', slPctBtn:'%', sharesLbl:'Единиц для покупки', riskAmountLbl:'Сумма риска', positionLbl:'Общая позиция', slDistLbl:'Расстояние стопа', portfolioPctLbl:'Использовано портфеля', footer:'unda · управляй своим риском',
      infoOk: (sh, sym, risk, pos, pct) => `Купите ${sh} единиц. Вы рискуете ${sym}${risk} (${pct}% портфеля). Общая позиция: ${sym}${pos}.`,
      infoWarn: 'Позиция превышает 20% портфеля. Рассмотрите уменьшение риска %.',
      infoBig: 'Позиция превышает портфель. Уменьшите размер или проверьте вход/стоп.',
    },
  };

  let currentLang = 'en';
  let slMode = 'price';

  function toggleLangMenu() { document.getElementById('lang-sw').classList.toggle('open'); }
  document.addEventListener('click', e => {
    if (!document.getElementById('lang-sw').contains(e.target))
      document.getElementById('lang-sw').classList.remove('open');
  });

  function setSlMode(mode) {
    const prevMode = slMode;
    slMode = mode;
    document.getElementById('sl-price-btn').classList.toggle('active', mode === 'price');
    document.getElementById('sl-pct-btn').classList.toggle('active', mode === 'pct');
    document.getElementById('sl-price-wrap').style.display = mode === 'price' ? '' : 'none';
    document.getElementById('sl-pct-wrap').style.display  = mode === 'pct'   ? '' : 'none';
    // Auto-convert price → %
    if (prevMode === 'price' && mode === 'pct') {
      const entry = v('entry'), slPrice = v('slPrice');
      if (ok(entry, slPrice) && slPrice < entry)
        document.getElementById('slPct').value = ((entry - slPrice) / entry * 100).toFixed(2);
    }
    // Auto-convert % → price
    if (prevMode === 'pct' && mode === 'price') {
      const entry = v('entry'), slPct = v('slPct');
      if (ok(entry, slPct))
        document.getElementById('slPrice').value = (entry - entry * slPct / 100).toFixed(entry < 1 ? 6 : 2);
    }
    calc();
  }

  function setLang(code, label) {
    currentLang = code;
    const T = LANGS[code];
    document.documentElement.setAttribute('lang', code);
    document.documentElement.setAttribute('dir', T.dir);
    if (label) document.getElementById('cur-lang').textContent = label;
    document.querySelectorAll('.lang-menu div').forEach(d => {
      d.classList.toggle('active', d.textContent.trim().endsWith(code.toUpperCase()));
    });
    document.getElementById('t-title').textContent          = T.title;
    document.getElementById('t-portfolio-lbl').textContent  = T.portfolioLbl;
    document.getElementById('t-risk-lbl').textContent       = T.riskLbl;
    document.getElementById('t-entry-lbl').textContent      = T.entryLbl;
    document.getElementById('t-sl-lbl').textContent         = T.slLbl;
    document.getElementById('sl-price-btn').textContent     = T.slPriceBtn;
    document.getElementById('sl-pct-btn').textContent       = T.slPctBtn;
    document.getElementById('t-shares-lbl').textContent     = T.sharesLbl;
    document.getElementById('t-risk-amount-lbl').textContent= T.riskAmountLbl;
    document.getElementById('t-position-lbl').textContent   = T.positionLbl;
    document.getElementById('t-sl-dist-lbl').textContent    = T.slDistLbl;
    document.getElementById('t-portfolio-pct-lbl').textContent = T.portfolioPctLbl;
    document.getElementById('t-footer').textContent         = T.footer;
    // Update currency symbols
    const sym = T.sym;
    document.getElementById('px-portfolio').textContent = sym;
    document.getElementById('px-risk').textContent      = sym;
    document.getElementById('px-entry').textContent     = sym;
    document.getElementById('px-sl').textContent        = sym;
    document.getElementById('lang-sw').classList.remove('open');
    calc();
  }

  function v(id) { return parseFloat(document.getElementById(id).value); }
  function set(id, val) { const el = document.getElementById(id); if (el && document.activeElement !== el) el.value = val; }
  function ok(...args) { return args.every(x => !isNaN(x) && isFinite(x) && x > 0); }

  function syncRPtoU() {
    const p = v('portfolio'), pct = v('riskPct');
    if (ok(p, pct)) set('riskUsd', (pct/100*p).toFixed(2));
  }
  function syncRUtoP() {
    const p = v('portfolio'), usd = v('riskUsd');
    if (ok(p, usd)) set('riskPct', (usd/p*100).toFixed(2));
  }

  function fmt(n, decimals = 2) {
    return n.toLocaleString('en-US', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  }

  function calc() {
    const T         = LANGS[currentLang];
    const sym       = T.sym;
    const portfolio = v('portfolio');
    const riskPct   = v('riskPct');
    const entry     = v('entry');

    // Sync risk USD
    if (ok(portfolio, riskPct)) {
      set('riskUsd', (riskPct/100*portfolio).toFixed(2));
    }

    // Determine stop distance
    let slDist = NaN;
    if (slMode === 'price') {
      const slPrice = v('slPrice');
      if (ok(entry, slPrice) && slPrice < entry) {
        slDist = entry - slPrice;
      }
    } else {
      const slPct = v('slPct');
      if (ok(entry, slPct)) {
        slDist = entry * slPct / 100;
      }
    }

    const dash = '—';
    if (!ok(portfolio, riskPct, entry) || isNaN(slDist) || slDist <= 0) {
      document.getElementById('res-shares').textContent       = dash;
      document.getElementById('res-risk').textContent         = dash;
      document.getElementById('res-position').textContent     = dash;
      document.getElementById('res-sl-dist').textContent      = dash;
      document.getElementById('res-portfolio-pct').textContent= dash;
      document.getElementById('info-box').style.display       = 'none';
      return;
    }

    const riskAmount  = (riskPct / 100) * portfolio;
    const shares      = riskAmount / slDist;
    const position    = shares * entry;
    const portfolioPct = (position / portfolio) * 100;

    // Auto-detect decimals: < 1 = 6 decimals, 1-100 = 4, > 100 = 2, > 1000 = whole number
    let sharesDisplay;
    if (shares >= 1000) sharesDisplay = Math.round(shares).toLocaleString('en-US');
    else if (shares >= 1) sharesDisplay = fmt(shares, shares >= 100 ? 2 : 4);
    else sharesDisplay = shares.toFixed(6);

    document.getElementById('res-shares').textContent        = sharesDisplay;
    document.getElementById('res-risk').textContent          = sym + fmt(riskAmount);
    document.getElementById('res-position').textContent      = sym + fmt(position);
    document.getElementById('res-sl-dist').textContent       = sym + fmt(slDist, entry < 1 ? 6 : 2) + ' (' + (slDist/entry*100).toFixed(2) + '%)';
    document.getElementById('res-portfolio-pct').textContent = portfolioPct.toFixed(1) + '%';

    // Info box
    const info = document.getElementById('info-box');
    info.style.display = 'block';
    if (position > portfolio) {
      info.textContent = T.infoBig;
      info.style.borderColor = 'rgba(255,68,68,0.3)';
      info.style.color = 'rgba(255,150,150,0.8)';
    } else if (portfolioPct > 20) {
      info.textContent = T.infoWarn;
      info.style.borderColor = 'rgba(255,200,0,0.3)';
      info.style.color = 'rgba(255,220,130,0.8)';
    } else {
      info.textContent = T.infoOk(sharesDisplay, sym, fmt(riskAmount), fmt(position), portfolioPct.toFixed(1));
      info.style.borderColor = 'rgba(0,255,178,0.15)';
      info.style.color = 'rgba(180,240,220,0.6)';
    }
  }

  /* ── Init ── */
  const browserLang = (navigator.language || 'en').split('-')[0].toLowerCase();
  const flagMap = { nl:'🇳🇱 NL', en:'🇬🇧 EN', fr:'🇫🇷 FR', es:'🇪🇸 ES', de:'🇩🇪 DE', it:'🇮🇹 IT', pt:'🇵🇹 PT', tr:'🇹🇷 TR', ar:'🇸🇦 AR', ru:'🇷🇺 RU' };
  const initLang = LANGS[browserLang] ? browserLang : 'en';
  setLang(initLang, flagMap[initLang]);
</script>
</body>
</html>
